<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Jessica Randall – Frontend Developer</title>
    <!-- FONT -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap"
      rel="stylesheet" />
    <!-- CSS -->
    <link rel="stylesheet" href="css/variabel.css" />
    <link rel="stylesheet" href="css/reset.css" />
    <link rel="stylesheet" href="css/style.css" />
  </head>

  <body>
    <main>
      <article class="card" aria-label="Jessica Randall's profile card">
        <!-- Avatar -->
        <header class="profile-info">
          <div class="avatar-wrapper">
            <img
              class="avatar"
              src="assets/images/avatar-jessica.jpeg"
              alt="Portrait of Jessica Randall"
              width="96"
              height="96" />
          </div>

          <h1 class="profile-name">Jessica Randall</h1>
          <p
            class="profile-location"
            aria-label="Location: London, United Kingdom">
            London, United Kingdom
          </p>
          <p class="profile-bio">"Front-end developer and avid reader."</p>
        </header>

        <!-- Social Links -->
        <nav class="links-nav" aria-label="Jessica's social links">
          <a
            href="https://github.com"
            class="link-item"
            target="_blank"
            rel="noopener noreferrer"
            aria-label="Visit Jessica's GitHub profile">
            <!-- GitHub icon -->
            <svg
              class="link-icon"
              viewBox="0 0 24 24"
              fill="currentColor"
              aria-hidden="true">
              <path

            </svg>
            <span class="link-label">GitHub</span>
          </a>

          <a
            href="https://www.frontendmentor.io"
            class="link-item"
            target="_blank"
            rel="noopener noreferrer"
            aria-label="Visit Jessica's Frontend Mentor profile">
            <!-- Frontend Mentor icon (FM letter mark) -->
            <svg
              class="link-icon"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
              aria-hidden="true">
              <path d="M3 8l7-5 7 5v10a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V8z" />
              <polyline points="9 22 9 12 15 12 15 22" />
            </svg>
            <span class="link-label">Frontend Mentor</span>
          </a>

          <a
            href="https://linkedin.com"
            class="link-item"
            target="_blank"
            rel="noopener noreferrer"
            aria-label="Visit Jessica's LinkedIn profile">
            <!-- LinkedIn icon -->
            <svg
              class="link-icon"
              viewBox="0 0 24 24"
              fill="currentColor"
              aria-hidden="true">
              <path
                d="M20.45 20.45h-3.56v-5.57c0-1.33-.03-3.04-1.85-3.04-1.86 0-2.14 1.45-2.14 2.95v5.66H9.35V9h3.41v1.56h.05c.48-.9 1.64-1.85 3.37-1.85 3.6 0 4.27 2.37 4.27 5.46v6.28zM5.34 7.43a2.07 2.07 0 1 1 0-4.14 2.07 2.07 0 0 1 0 4.14zM7.12 20.45H3.56V9h3.56v11.45zM22.22 0H1.77C.79 0 0 .77 0 1.72v20.56C0 23.23.79 24 1.77 24h20.45c.98 0 1.78-.77 1.78-1.72V1.72C24 .77 23.2 0 22.22 0z" />
            </svg>
            <span class="link-label">LinkedIn</span>
          </a>

          <a
            href="https://twitter.com"
            class="link-item"
            target="_blank"
            rel="noopener noreferrer"
            aria-label="Visit Jessica's Twitter profile">
            <!-- X / Twitter icon -->
            <svg
              class="link-icon"
              viewBox="0 0 24 24"
              fill="currentColor"
              aria-hidden="true">
              <path
                d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z" />
            </svg>
            <span class="link-label">Twitter</span>
          </a>

            href="https://instagram.com"
            class="link-item"
            target="_blank"
            rel="noopener noreferrer"
            aria-label="Visit Jessica's Instagram profile">

            <svg
              class="link-icon"
              viewBox="0 0 24 24"
              fill="currentColor"
              aria-hidden="true">
              <path
                d="M12 2.163c3.204 0 3.584.012 4.85.07 1.366.062 2.633.333 3.608 1.308.975.975 1.246 2.242 1.308 3.608.058 1.266.07 1.646.07 4.85s-.012 3.584-.07 4.85c-.062 1.366-.333 2.633-1.308 3.608-.975.975-2.242 1.246-3.608 1.308-1.266.058-1.646.07-4.85.07s-3.584-.012-4.85-.07c-1.366-.062-2.633-.333-3.608-1.308-.975-.975-1.246-2.242-1.308-3.608C2.175 15.584 2.163 15.204 2.163 12s.012-3.584.07-4.85c.062-1.366.333-2.633 1.308-3.608C4.516 2.567 5.783 2.296 7.15 2.234 8.416 2.175 8.796 2.163 12 2.163zm0-2.163C8.741 0 8.332.013 7.052.072 5.197.157 3.355.748 1.946 2.157.537 3.566-.054 5.408.03 7.263-.013 8.332 0 8.741 0 12c0 3.259.013 3.668.072 4.948.085 1.855.676 3.697 2.085 5.106 1.409 1.409 3.251 2 5.106 2.085C8.332 23.987 8.741 24 12 24s3.668-.013 4.948-.072c1.855-.085 3.697-.676 5.106-2.085 1.409-1.409 2-3.251 2.085-5.106.059-1.28.072-1.689.072-4.948 0-3.259-.013-3.668-.072-4.948-.085-1.855-.676-3.697-2.085-5.106C20.645.748 18.803.157 16.948.072 15.668.013 15.259 0 12 0zm0 5.838a6.162 6.162 0 1 0 0 12.324 6.162 6.162 0 0 0 0-12.324zm0 10.162a4 4 0 1 1 0-8 4 4 0 0 1 0 8zm6.406-11.845a1.44 1.44 0 1 0 0 2.881 1.44 1.44 0 0 0 0-2.881z" />

          <!-- Facebook -->
          <a
            href="https://facebook.com"
            class="link-item"
            target="_blank"
            rel="noopener noreferrer"
            aria-label="Visit Jessica's Facebook profile">
            <!-- Facebook icon -->
            <svg
              class="link-icon"
              xmlns="http://www.w3.org/2000/svg"
              viewBox="0 0 640 640"
              fill="currentColor">
              <path
                d="M240 363.3L240 576L356 576L356 363.3L442.5 363.3L460.5 265.5L356 265.5L356 230.9C356 179.2 376.3 159.4 428.7 159.4C445 159.4 458.1 159.8 465.7 160.6L465.7 71.9C451.4 68 416.4 64 396.2 64C289.3 64 240 114.5 240 223.4L240 265.5L174 265.5L174 363.3L240 363.3z" />
            </svg>
            <span class="link-label">Facebook</span>
          </a>
        </nav>

        <!-- Footer -->
        <footer class="card-footer">
          <p>
            Challenge by
            <a
              href="https://www.frontendmentor.io"
              target="_blank"
              rel="noopener noreferrer"
              >Frontend Mentor</a
            >
          </p>
        </footer>
      </article>
    </main>
  </body>
</html>
